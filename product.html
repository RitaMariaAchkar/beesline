<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Product | Beesline</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="images/beesline_favicon.png" rel="icon" type="image/x-icon" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header>
            <div class="logo">
                <a href="index.html">
                    <img src="images/beesline_horizontal_logo.png" style="height: 40px" alt="Beesline" />
                </a>
            </div>

            <nav>
                <a href="shop_all.html">Shop All</a>
                <a href="recommendation.html">Recommendation</a>
                <a href="about_us.html">About Us</a>
            </nav>

            <div class="header-icons">
                <a href="shop_all.html" aria-label="Search products">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </a>

                <div class="cart-wrap">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 01-8 0" />
                    </svg>
                    <span class="cart-badge">0</span>
                </div>
            </div>
        </header>

        <main class="product-page">
            <section id="product-detail" class="product-detail-shell"></section>

            <section class="related-products-section px-4 py-4">
                <h2 class="section-title">You May Also Like</h2>
                <p class="section-sub">More care picks from the same family.</p>
                <div id="related-products" class="bundles-grid related-products-grid"></div>
            </section>
        </main>

        <script src="products.js"></script>
        <script src="utils.js"></script>
        <script>
            (() => {
                const params = new URLSearchParams(window.location.search);
                const productId = Number(params.get("id"));
                const product = getProductById(productId);
                const detailContainer = document.querySelector("#product-detail");
                const relatedContainer = document.querySelector(".related-products-section");

                if (!detailContainer) return;

                if (!product) {
                    document.title = "Product Not Found | Beesline";
                    detailContainer.innerHTML = `
                        <div class="product-not-found">
                            <p class="product-eyebrow">Oops, tiny bee detour.</p>
                            <h1>Product not found</h1>
                            <p>We could not find this product. Head back to the full shop and choose another Beesline favorite.</p>
                            <a href="shop_all.html" class="btn-primary">Back to Shop</a>
                        </div>
                    `;

                    if (relatedContainer) {
                        relatedContainer.style.display = "none";
                    }

                    return;
                }

                const hasDiscount = product.discount && product.discount > 0;
                const finalPrice = getProductFinalPrice(product);
                const tags = getProductTags(product);
                const categoryLabel = `${product.category || "care"} care`;
                const productTitle = product.title || `A targeted Beesline ${categoryLabel} pick`;

                document.title = `${product.name} | Beesline`;

                detailContainer.innerHTML = `
                    <div class="product-detail-card">
                        <div class="product-gallery">
                            ${hasDiscount ? `<span class="save-badge product-save-badge">Save ${product.discount}%</span>` : ""}
                            <img src="${getProductImageSrc(product)}" alt="${escapeHTML(product.name)}" />
                        </div>

                        <div class="product-detail-info">
                            <p class="product-eyebrow">${escapeHTML(categoryLabel)}</p>
                            <h1>${escapeHTML(product.name)}</h1>
                            <p class="product-subtitle">${escapeHTML(productTitle)}</p>
                            <p class="product-lede">${escapeHTML(product.desc)}</p>

                            <div class="product-tags">
                                ${tags.map((tag) => `<span>${escapeHTML(tag)}</span>`).join("")}
                            </div>

                            <div class="product-price-block">
                                <span class="product-price">${formatCurrency(finalPrice)}</span>
                                ${hasDiscount ? `<span class="product-old-price">${formatCurrency(product.price)}</span>` : ""}
                            </div>

                            <div class="product-meta-grid">
                                <div>
                                    <span>Product ID</span>
                                    <strong>#${product.id}</strong>
                                </div>
                                <div>
                                    <span>Category</span>
                                    <strong>${escapeHTML(product.category || "care")}</strong>
                                </div>
                                <div>
                                    <span>Tags</span>
                                    <strong>${tags.length}</strong>
                                </div>
                            </div>

                            <div class="quantity-panel" aria-label="Choose quantity">
                                <span>Quantity</span>
                                <div class="quantity-control">
                                    <button type="button" data-qty-action="decrease" aria-label="Decrease quantity">-</button>
                                    <input id="product-quantity" type="number" value="1" min="1" max="99" />
                                    <button type="button" data-qty-action="increase" aria-label="Increase quantity">+</button>
                                </div>
                            </div>

                            <div class="product-actions">
                                <button id="add-product-to-cart" class="btn-primary" type="button">Add to Cart</button>
                                <a href="shop_all.html" class="btn-soft">Keep Shopping</a>
                            </div>
                        </div>
                    </div>
                `;

                const quantityInput = document.querySelector("#product-quantity");
                const addButton = document.querySelector("#add-product-to-cart");

                document.querySelectorAll("[data-qty-action]").forEach((button) => {
                    button.addEventListener("click", () => {
                        const currentValue = Math.max(1, Number(quantityInput.value) || 1);
                        const nextValue = button.dataset.qtyAction === "increase" ? currentValue + 1 : currentValue - 1;

                        quantityInput.value = Math.min(99, Math.max(1, nextValue));
                    });
                });

                quantityInput.addEventListener("input", () => {
                    quantityInput.value = Math.min(99, Math.max(1, Number(quantityInput.value) || 1));
                });

                addButton.addEventListener("click", () => {
                    const quantity = Math.max(1, Number(quantityInput.value) || 1);

                    addToCart(product.id, quantity);
                    openCartPopup();

                    addButton.textContent = "Added to Cart";
                    window.setTimeout(() => {
                        addButton.textContent = "Add to Cart";
                    }, 1200);
                });

                const relatedProducts = products
                    .filter((item) => item.id !== product.id && item.category === product.category)
                    .slice(0, 2);

                renderProducts(relatedProducts, "#related-products");
            })();
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
