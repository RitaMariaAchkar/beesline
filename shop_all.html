<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shop All | Beesline</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
            rel="stylesheet"
        />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
        <link href="images/beesline_favicon.png" rel="icon" type="image/x-icon" />
        <style>
            #search {
                height: 60px;
                background-color: #e8a820;
                display: flex;
                align-items: center;
                padding: 0px 20px;
            }

            #search_input {
                width: 250px;
            }

            #products-grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
                padding: 20px;
            }

            .btn-check:checked + .btn,
            .btn.active,
            .btn.show,
            .btn:first-child:active,
            :not(.btn-check) + .btn:active {
                background-color: #ca810a;
                border-color: #ca810a;
            }

            .btn-check:checked + .btn,
            .btn.active,
            .btn.show,
            .btn:first-child:active,
            :not(.btn-check) + .btn:active {
                border-radius: 10px;
            }

            [type="button"]:not(:disabled),
            [type="reset"]:not(:disabled),
            [type="submit"]:not(:disabled),
            button:not(:disabled) {
                border-radius: 10px;
            }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">
                <a href="index.html">
                    <img src="images/beesline_horizontal_logo.png" style="height: 40px" alt="Beesline" />
                </a>
            </div>

            <nav>
                <a href="shop_all.html" style="color: var(--gold)">Shop All</a>
                <a href="recommendation.html">Recommendation</a>
                <a href="about_us.html">About Us</a>
            </nav>

            <div class="header-icons">
                <a href="shop_all.html" aria-label="Search products">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                </a>
                <div class="cart-wrap">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 01-8 0" />
                    </svg>
                    <span class="cart-badge">0</span>
                </div>
            </div>
        </header>

        <section id="search">
            <input
                id="search_input"
                type="text"
                class="form-control me-3"
                placeholder="Search..."
                aria-label="Search..."
            />

            <div class="dropdown">
                <button
                    class="btn btn-primary dropdown-toggle"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false"
                >
                    Select Options
                </button>
                <ul class="dropdown-menu">
                    <li class="px-3 py-1">
                        <div class="form-check">
                            <input
                                class="form-check-input category-filter"
                                type="checkbox"
                                id="face"
                                data-category="face"
                            />
                            <label class="form-check-label" for="face">Face Care</label>
                        </div>
                    </li>
                    <li class="px-3 py-1">
                        <div class="form-check">
                            <input
                                class="form-check-input category-filter"
                                type="checkbox"
                                id="body"
                                data-category="body"
                            />
                            <label class="form-check-label" for="body">Body Care</label>
                        </div>
                    </li>
                    <li class="px-3 py-1">
                        <div class="form-check">
                            <input
                                class="form-check-input category-filter"
                                type="checkbox"
                                id="hair"
                                data-category="hair"
                            />
                            <label class="form-check-label" for="hair">Hair Care</label>
                        </div>
                    </li>
                    <li class="px-3 py-1">
                        <div class="form-check">
                            <input
                                class="form-check-input category-filter"
                                type="checkbox"
                                id="bundle"
                                data-category="bundle"
                            />
                            <label class="form-check-label" for="bundle">Bundle</label>
                        </div>
                    </li>
                </ul>
            </div>
        </section>

        <section id="products-grid"></section>

        <script src="products.js"></script>
        <script src="utils.js"></script>

        <script>
            (() => {
                // Initial render on page load
                renderProducts(products, "#products-grid");

                function updateGallery() {
                    const searchInput = document.querySelector("#search_input");
                    const searchTerm = searchInput ? searchInput.value.toLowerCase() : "";

                    // Get checked categories
                    const activeCategories = Array.from(document.querySelectorAll(".category-filter"))
                        .filter((cb) => cb.checked)
                        .map((cb) => cb.dataset.category);

                    const filtered = products.filter((p) => {
                        const name = (p.name || "").toLowerCase();
                        const category = p.category || "";

                        const matchesSearch = name.includes(searchTerm);
                        const matchesCategory = activeCategories.length === 0 || activeCategories.includes(category);

                        return matchesSearch && matchesCategory;
                    });

                    renderProducts(filtered, "#products-grid");
                }

                // Listen for typing in the search bar
                const searchInput = document.querySelector("#search_input");
                if (searchInput) {
                    searchInput.addEventListener("input", updateGallery);
                }

                // Listen for checkbox changes
                const checkboxes = document.querySelectorAll(".category-filter");
                checkboxes.forEach((cb) => {
                    cb.addEventListener("change", updateGallery);
                });

                // OPTIONAL: Stop dropdown from closing when clicking checkboxes
                document.querySelectorAll(".dropdown-menu").forEach((menu) => {
                    menu.addEventListener("click", (e) => e.stopPropagation());
                });
            })();
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
